<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.linha {
    width: 100%;
    height: 40px;
    display: flex;
    align-items: center;
    padding-left: 20px;
}

.switch {
    position: relative;
    width: 32px;
    height: 32px;
    overflow: hidden;
    cursor: pointer;
}

.quadrado {
    position: absolute;
    inset: 0;
    border: 2px solid rgb(0, 0, 0);
    transition: transform .35s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

.cheio {
    transform: translateY(0);
}

.vazio {
    transform: translateY(-40px);
}

.switch:hover .cheio {
    transform: translateY(40px);
}

.switch:hover .vazio {
    transform: translateY(0);
}

.bolinha-central {
    width: 18px;
    height: 18px;
    border: 2px solid #273c76;
    border-radius: 50%;

    display: flex;
    justify-content: center;
    align-items: center;

    color: #273c76;
    font-size: 10px;
    font-weight: bold;
    box-sizing: border-box;
}

/* Loading */

.loading {
    display: flex;
    gap: 2px;
    align-items: center;
}

.dot {
    width: 4px;
    height: 4px;
    background: #273c76;
    border-radius: 50%;
    animation: bounce 0.9s infinite;
}

.dot:nth-child(2) {
    animation-delay: 0.15s;
}

.dot:nth-child(3) {
    animation-delay: 0.30s;
}

@keyframes bounce {
    0%, 100% {
        transform: translateY(0) scale(1);
    }

    50% {
        transform: translateY(-4px) scale(1.3);
    }
}
    </style>
</head>
<body>
<div class="linha">
    <div class="switch">
        <div class="quadrado cheio">
            <div class="bolinha-central"></div>
        </div>

        <div class="quadrado vazio">
            <div class="loading">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
