<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procurar Pessoas</title>
  <link rel="stylesheet" href="/static/css/style2.css">
</head>
<body>

  <!-- APPBAR -->
  <div class="friend-header" style="display:flex; align-items:center; gap:20px;">
      <button onclick="window.location.href='dashboard'"
              style="width:40px; height:40px; padding:0; display:flex; justify-content:center; align-items:center;">
          ⬅
      </button>

      <h3 style="margin: 0;">Procurar Pessoas</h3>
  </div>

  <!-- CONTEÚDO -->
  <div style="padding: 24px; max-width: 600px; margin:auto;">

      <label style="font-size:14px; margin-bottom:8px; display:block;">Nome do usuário</label>
      <input id="searchInput" type="text" placeholder="Digite o nome...">

      <div id="results" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
          <!-- Resultados vão aparecer aqui -->
      </div>

  </div>
      <div id="frprofModal" class="modal">
      <div class="modal-content" onclick="event.stopPropagation()">
          
          <button class="modal-close" onclick="closeModal()">×</button>

          <h3 id="username">NAME HERE</h3>

          <div class="modal-buttons">
            <button class="modal-content-button-sendfr" onclick="sendfr()" id="sendfrbtn">Send Friend Request</button>
          </div>

      </div>
    </div>

<script src="/static/js/sp.js">

</script>

</body>
</html>
