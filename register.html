<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Alpha Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reg.css') }}">
  <link rel="stylesheet" href="static/css/reg.css">
</head>
<body>
  <div class="container">
    <h1>Create Account</h1>
    <p class="subtitle">Join Concord today!</p>
    
    <form id="registerForm">
      <div class="input-group">
        <label for="email">EMAIL <span class="required">*</span></label>
        <input type="email" placeholder="Enter your email" id="email" required>
      </div>
      
      <div class="input-group">
        <label for="username">USERNAME <span class="required">*</span></label>
        <input type="text" placeholder="Choose a username" id="username" required>
      </div>
      
      <div class="input-group">
        <label for="password">PASSWORD <span class="required">*</span></label>
        <input type="password" placeholder="Create a password" id="password" required>
      </div>
      
      <button type="submit" id="registerbtn">Register</button>
      
      <p id="error"></p>
      
      <p class="register-text">Already have an account? <a href="login" class="register-link">Login</a></p>
    </form>
  </div>

  <!-- Verification Code Modal -->
  <div id="codeModal" class="modal">
    <div class="modal-content">
      <h3>Email Verification</h3>
      <p class="modal-subtitle">Enter the code sent to your email</p>
      <div class="input-group">
        <input type="text" id="codeInput" placeholder="Enter verification code">
        <p id="error2" class="error2"></p>
      </div>
      <button id="verifyBtn">Verify Code</button>
    </div>
  </div>

  <script crossorigin="anonymous" src="//unpkg.com/same-runtime/dist/index.global.js"></script>
  <script src="{{ url_for('static', filename='js/reg.js') }}"></script>
  <script src="/static/js/reg.js"></script>
    
  </script>
</body>
</html>
