<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Concord</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">
  <link rel="stylesheet" href="static/css/style2.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loader"></div>
    <h2 id="textloading"></h2>
    <p id="error"></p>
  </div>

  <div id="dashboard">
      <div id="sidebar1">
      <div class="sidebar1-header">
        
        
      </div>
      <div class="rooms-section">
        
        <ul id="room-list"></ul>
      </div>
      
    </div>
    <div id="sidebar2">

      

      <div class="sidebar2-header">
        <h2>Find or start a conversation</h2>
      </div>
      <div class="sidebar1-header-btnfriend"> <button id="friendsbtn" onclick="openftab()"> <i data-lucide="users"></i> Friends</button> </div>
      <div class="dm-section">
       
      </div>
      
      <hr>

      <div id="friendsbar">

      </div>
    </div>
    
    <div id="concord-area">
      <div id="toast">
          <i data-lucide="user-check"></i>
          <span id="spanacceptfr"></span>
      </div>
        <div class="friend-header">
          <p style="font-size: 16px; color: var(--text-muted); margin-top: 4px;">Amigos</p>
          <h3 id="current-room">
            <div id="buttonsfriend">
              <button id="onlinefriends" onclick="console.log('placeholder')">Online</button>
              <button id="allfriends" onclick="openftab()">Todos</button>
              <button id="sentfriends" onclick="openfrtab()">Pedidos</button>
              <button id="addfriends" onclick="window.location.href = 'searchpeoples'">Adicionar Amigos</button>
            </div>
          </h3>
        </div>
        <div id="frtou" class="friend-header-req" style="float: left;" hidden>
        <p style="font-size: 16px; color: var(--text-muted); margin-top: 4px;">Friend Requests</p>
        </div>

        <div id="friendstab" class="friend-header-req" style="float: left;" hidden>
        <p style="font-size: 16px; color: var(--text-muted); margin-top: 4px;">Friends</p>
        </div>

        <div id="message-area" class="message-area" style="float: left;" id="message-area" hidden>
          <div id="message-area-name" class="friend-header-req" style="float: left;">
            davegameradmchego
          </div>

          <div class="messages">
            gg
          </div>

          <div class="inputs" id="message-inp">
            <input type="text" id="inputmsg">
          </div>
        </div>
    </div>
    
    <div id="frprofModal" class="modal">
      <div class="modal-content" onclick="event.stopPropagation()">
          
          <button class="modal-close" onclick="closeModal()">×</button>

          <h3 id="modaltext">NAME HERE</h3>

          <div class="modal-buttons">
            <button class="modal-content-button" onclick="acceptfr()">accept</button>
            <button class="modal-content-button">decline</button>
          </div>

      </div>
    </div>


 
  <script crossorigin="anonymous" src="//unpkg.com/same-runtime/dist/index.global.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script>
    lucide.createIcons(); // ativa os ícones
  </script>
  <script src="{{ url_for('static', filename='js/dash.js') }}"></script>
  <script src="/static/js/dash.js"></script>
    
  </script>
</body>
</html>
